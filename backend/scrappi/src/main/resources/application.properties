spring.application.name=scrappi
# Fuerza la zona horaria en la conexión a la DB
spring.datasource.url=jdbc:postgresql://localhost:5432/db_scrappi?serverTimezone=America/Bogota

# Configura Hibernate para que no convierta a UTC
spring.jpa.properties.hibernate.jdbc.time_zone=America/Bogota

# Configura Jackson para que al enviar el JSON al Frontend mantenga la hora local
spring.jackson.time-zone=America/Bogota


# Ver exactamente qué pasa con la seguridad
logging.level.org.springframework.security=DEBUG
# Ver qué datos están llegando y saliendo
logging.level.org.springframework.web=DEBUG
# Ver las consultas a la base de datos (por si el usuario no existe)
logging.level.org.hibernate.SQL=DEBUG