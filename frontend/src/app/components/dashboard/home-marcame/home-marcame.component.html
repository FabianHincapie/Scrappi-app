<ng-template #content let-modal>
  <div class="modal-header border-0">
    <h4 class="modal-title fw-bold text-primary">Confirmación</h4>
    <button type="button" class="btn-close" aria-label="Close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body text-center p-4">
    <p class="lead">
      ¿Deseas registrar tu
      <strong class="text-uppercase">{{ jornadaActiva ? 'Salida' : 'Entrada' }}</strong>
      de turno?
    </p>
  </div>
  <div class="modal-footer border-0 d-flex justify-content-center">
    <button type="button" class="btn btn-secondary px-4" (click)="modal.dismiss()">Cancelar</button>
    <button type="button" class="btn btn-primary px-4 fw-bold" (click)="modal.close('confirmar')">
      Aceptar
    </button>
  </div>
</ng-template>

<div class="d-flex flex-column align-items-center justify-content-center mt-5" style="min-height: 75vh">
  <div
    class="card shadow-lg p-5 text-center border-0"
    style="border-radius: 25px; width: 100%; max-width: 400px"
  >
    <h3 class="text-primary fw-bold mb-0">sCrappi</h3>
    <small class="text-muted">ID: JMENDOTI-TUF</small>

    <div class="my-4">
      <h1 class="display-4 fw-bold text-dark">{{ horaActual | date: 'HH:mm:ss' }}</h1>
      <p class="text-secondary text-capitalize">{{ horaActual | date: 'EEEE, d MMMM y' }}</p>
    </div>
    <div
      *ngIf="mostrarAlertaExito"
      class="alert alert-success border-0 shadow-sm mb-4 fade show"
      role="alert"
      style="border-radius: 12px"
    >
      <small class="fw-bold">{{ mensajeAlerta }}</small>
    </div>

    <div
      *ngIf="mostrarAlertaError"
      class="alert alert-danger border-0 shadow-sm mb-4 fade show"
      role="alert"
      style="border-radius: 12px"
    >
      <div class="d-flex align-items-center justify-content-center">
        <small class="fw-bold">{{ mensajeError }}</small>
      </div>
    </div>

    <button
      (click)="solicitarRegistro(content)"
      [ngClass]="jornadaActiva ? 'btn-danger' : 'btn-success'"
      class="btn rounded-circle shadow-lg border-4 border-white mx-auto d-flex align-items-center justify-content-center"
      style="width: 170px; height: 170px; font-size: 1.3rem; font-weight: bold; line-height: 1.2"
    >
      REGISTRAR<br />{{ jornadaActiva ? 'SALIDA' : 'ENTRADA' }}
    </button>

    <div class="mt-4 p-3 rounded bg-light border">
      <small class="text-muted d-block">Estado del GPS:</small>
      <span
        [ngClass]="
          ubicacionEstado.includes('Error') || ubicacionEstado.includes('Fuera')
            ? 'text-danger'
            : 'text-primary'
        "
        class="fw-bold small"
      >
        {{ ubicacionEstado }}
      </span>
    </div>
  </div>
</div>
