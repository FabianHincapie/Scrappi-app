<div class="container-fluid py-4">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div class="search-box w-50">
      <input
        type="text"
        class="form-control"
        placeholder="Buscar por nombre o usuario..."
        (keyup)="filtrarUsuarios($event)"
      />
    </div>

    <button class="btn btn-primary" (click)="abrirModalNuevo(modalUser)">
      <i class="bi bi-person-plus"></i> Nuevo Usuario
    </button>
  </div>

  <div *ngIf="isLoading" class="text-center my-5">
    <div class="spinner-border text-primary" role="status"></div>
    <p>Cargando personal...</p>
  </div>

  <div class="card shadow-sm" *ngIf="!isLoading">
    <div class="card-body p-0">
      <div class="table-responsive">
        <table class="table table-hover align-middle mb-0">
          <thead class="table-light">
            <tr>
              <th>Documento</th>
              <th>Nombre Completo</th>
              <th>Usuario</th>
              <th>Rol</th>
              <th>Estado</th>
              <th class="text-center">Acciones</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let user of listaFiltrada">
              <td>{{ user.document }}</td>
              <td>{{ user.name }} {{ user.lastName }}</td>
              <td>{{ user.userName }}</td>
              <td>{{ user.role }}</td>
              <td>
                <span [class]="user.status ? 'badge bg-success' : 'badge bg-danger'">
                  {{ user.status ? 'Activo' : 'Inactivo' }}
                </span>
              </td>

              <td class="text-center">
                <div class="d-flex justify-content-center gap-2">
                  <button
                    class="btn btn-sm btn-outline-primary"
                    (click)="abrirModalEditar(user, modalUser)"
                    title="Editar"
                  >
                    <i class="bi bi-pencil"></i>
                  </button>

                  <button
                    *ngIf="user.status"
                    class="btn btn-sm btn-outline-danger"
                    (click)="eliminarUsuario(user.id)"
                    title="Desactivar"
                  >
                    <i class="bi bi-trash"></i>
                  </button>

                  <button
                    *ngIf="!user.status"
                    class="btn btn-sm btn-outline-success"
                    (click)="activarUsuario(user)"
                    title="Reactivar"
                  >
                    <i class="bi bi-check-circle"></i>
                  </button>
                </div>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<ng-template #modalUser let-modal>
  <div class="modal-header bg-light">
    <h5 class="modal-title fw-bold">
      {{ isEditing ? 'Editar Usuario' : 'Registrar Nuevo Usuario' }}
    </h5>
    <button type="button" class="btn-close" (click)="modal.dismiss()"></button>
  </div>
  <div class="modal-body">
    <form [formGroup]="userForm">
      <div class="row g-3">
        <div class="col-md-6">
          <label class="form-label small fw-bold">Nombre</label>
          <input type="text" class="form-control" formControlName="name" />
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">Apellido</label>
          <input type="text" class="form-control" formControlName="lastName" />
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">Documento</label>
          <input type="number" class="form-control" formControlName="document" />
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">Teléfono</label>
          <input type="number" class="form-control" formControlName="phone" />
        </div>
        <div class="col-md-6">
          <label class="form-label small fw-bold">Usuario</label>
          <input type="text" class="form-control" formControlName="userName" />
        </div>

        <div class="col-md-6" *ngIf="!isEditing">
          <label class="form-label small fw-bold">Contraseña</label>
          <input type="password" class="form-control" formControlName="password" />
        </div>

        <div class="col-md-6">
          <label class="form-label small fw-bold">Rol en el Sistema</label>
          <select class="form-select" formControlName="role">
            <option value="ADMIN">Administrador</option>
            <option value="SUPERVISOR">Supervisor</option>
            <option value="EMPLOYED">Empleado</option>
          </select>
        </div>

        <div class="col-md-6 d-flex align-items-end pb-2">
          <div class="form-check form-switch">
            <input
              class="form-check-input"
              type="checkbox"
              id="statusSwitch"
              formControlName="status"
            />
            <label class="form-check-label small fw-bold" for="statusSwitch">Activo</label>
          </div>
        </div>
      </div>
    </form>
  </div>
  <div class="modal-footer">
    <button type="button" class="btn btn-outline-secondary" (click)="modal.dismiss()">
      Cancelar
    </button>
    <button
      type="button"
      class="btn btn-primary"
      (click)="guardarUsuario()"
      [disabled]="userForm.invalid"
    >
      {{ isEditing ? 'Actualizar' : 'Registrar' }}
    </button>
  </div>
</ng-template>
